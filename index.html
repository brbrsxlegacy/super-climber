<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Island Clicker Heroes</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;overflow:hidden;background:#101020;font-family:Arial,Helvetica,sans-serif;color:white;touch-action:none}
  canvas{display:block;width:100vw;height:100vh;background:#78d9ff}
  #ui{position:fixed;inset:0;pointer-events:none}
  .topbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:min(720px,94vw);display:flex;gap:8px;align-items:center;justify-content:space-between}
  .pill{background:rgba(0,0,0,.38);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.18);border-radius:16px;padding:8px 12px;font-weight:900;text-shadow:0 2px 0 #000;box-shadow:0 8px 20px rgba(0,0,0,.22)}
  .hpbox{position:absolute;left:50%;bottom:132px;transform:translateX(-50%);width:min(540px,86vw);background:rgba(0,0,0,.44);border:2px solid rgba(255,255,255,.25);border-radius:18px;padding:8px 10px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,.25)}
  .hpname{font-weight:900;font-size:15px;text-shadow:0 2px #000;margin-bottom:4px}
  .hpbar{height:20px;background:#24141a;border-radius:999px;overflow:hidden;border:2px solid #fff2}
  .hpfill{height:100%;width:100%;background:linear-gradient(90deg,#ff3a3a,#ffb13a);border-radius:999px;transition:width .12s}
  .tabs{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;width:min(760px,96vw);pointer-events:auto}
  .tab{flex:1;border:0;border-radius:20px;background:linear-gradient(#ffe17d,#d98221);color:#281300;font-size:13px;font-weight:900;padding:10px 6px;box-shadow:0 6px 0 #7b3c0c,0 10px 24px rgba(0,0,0,.32);cursor:pointer}
  .tab:active{transform:translateY(4px);box-shadow:0 2px 0 #7b3c0c}
  .panel{position:absolute;right:10px;top:78px;width:min(330px,45vw);max-height:calc(100vh - 170px);overflow:auto;background:rgba(25,15,36,.86);border:3px solid rgba(255,255,255,.22);border-radius:24px;padding:10px;pointer-events:auto;box-shadow:0 14px 36px rgba(0,0,0,.45)}
  .panel h2{font-size:18px;margin:6px 6px 10px;text-shadow:0 2px #000}
  .card{display:flex;gap:10px;align-items:center;background:linear-gradient(180deg,#ffe589,#ffbd45);color:#351900;border-radius:18px;margin:8px 0;padding:8px;border:2px solid #fff6;box-shadow:0 5px 0 #9b5a12;font-weight:900}
  .avatar{width:54px;height:54px;border-radius:14px;background:#fff3;display:grid;place-items:center;font-size:30px;border:2px solid #0002}
  .card small{display:block;font-weight:800;color:#633200}
  .buy{margin-left:auto;border:0;border-radius:14px;background:#2f9cff;color:white;font-weight:900;padding:8px 10px;box-shadow:0 4px 0 #0a4e9a;cursor:pointer}
  .buy:active{transform:translateY(3px);box-shadow:0 1px 0 #0a4e9a}
  .float{position:absolute;font-size:22px;font-weight:1000;text-shadow:0 3px #000;pointer-events:none;animation:up .75s ease-out forwards;color:#fff2a8}
  @keyframes up{from{transform:translate(-50%,0) scale(.9);opacity:1}to{transform:translate(-50%,-75px) scale(1.3);opacity:0}}
  @media(max-width:760px){.panel{left:10px;right:10px;top:auto;bottom:74px;width:auto;max-height:220px}.hpbox{bottom:300px}.topbar{font-size:12px}.tab{font-size:11px;padding:9px 3px}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div class="topbar">
    <div class="pill">💰 <span id="gold">0</span></div>
    <div class="pill">⚔️ DPS <span id="dps">1</span></div>
    <div class="pill">🌍 Bölge <span id="zone">1</span></div>
  </div>
  <div class="panel" id="panel">
    <h2>🛒 Kahramanlar</h2>
    <div id="heroes"></div>
  </div>
  <div class="hpbox">
    <div class="hpname" id="bossName">Boss</div>
    <div class="hpbar"><div class="hpfill" id="hpfill"></div></div>
  </div>
  <div class="tabs">
    <button class="tab" onclick="setPanel('heroes')">Kahramanlar</button>
    <button class="tab" onclick="setPanel('skills')">Güçler</button>
    <button class="tab" onclick="setPanel('areas')">Bölgeler</button>
  </div>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const DPR=Math.max(1,Math.min(2,devicePixelRatio||1));
let W=0,H=0;
function resize(){W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',resize);resize();

let gold=0,zone=1,shake=0,last=performance.now(),clickPower=8;
let particles=[],hits=[],coins=[];
const fmt=n=> n<1000?Math.floor(n): n<1e6?(n/1e3).toFixed(1)+'K':n<1e9?(n/1e6).toFixed(1)+'M':(n/1e9).toFixed(1)+'B';

const areas=[
  {name:'Drylands',sky:['#70e8ff','#f5fff0'],ground:'#e5b742',edge:'#b88425',deco:'#3b7a35'},
  {name:'Astral Rift',sky:['#0a0a2a','#3046a6'],ground:'#5443bc',edge:'#2a1e6e',deco:'#7df0ff'},
  {name:'Jungle Ruins',sky:['#7dffb4','#f5ffe2'],ground:'#4caf50',edge:'#236c32',deco:'#0b5a25'},
  {name:'Lava Core',sky:['#351018','#ff6b21'],ground:'#3d2b2b',edge:'#1a1111',deco:'#ffb21e'}
];
const bossTypes=[
  {name:'Mud Golem',emoji:'🗿',hp:120,color:'#8b623e',accent:'#d8b06d'},
  {name:'Catra Beast',emoji:'🐯',hp:150,color:'#f39b27',accent:'#fff0a6'},
  {name:'Crystal Eye',emoji:'👁️',hp:190,color:'#9d58ff',accent:'#ff6af7'},
  {name:'Mush Doom',emoji:'🍄',hp:230,color:'#e2465a',accent:'#fff3a1'},
  {name:'Sky Serpent',emoji:'🐉',hp:290,color:'#38a9ff',accent:'#b7fff8'},
  {name:'Bone King',emoji:'💀',hp:360,color:'#d7d0b5',accent:'#4d3d35'}
];
let boss={};
function spawnBoss(){
  const t=bossTypes[(zone-1)%bossTypes.length];
  const max=Math.floor(t.hp*Math.pow(1.32,zone-1));
  boss={...t,maxHp:max,hp:max,x:W*.5,y:H*.46,scale:1,dead:false,rot:0};
  updateUI();
}

const heroes=[
  {name:'Bomba Max',icon:'🐺',lvl:1,dps:1,cost:20},
  {name:'Chiron',icon:'🦌',lvl:0,dps:5,cost:80},
  {name:'Moloch',icon:'🔥',lvl:0,dps:24,cost:420},
  {name:'Gog',icon:'🦁',lvl:0,dps:120,cost:1800},
  {name:'Nova Mage',icon:'🧙',lvl:0,dps:650,cost:9000}
];
function totalDps(){return heroes.reduce((s,h)=>s+h.lvl*h.dps,0)}
function buyHero(i){let h=heroes[i];if(gold>=h.cost){gold-=h.cost;h.lvl++;h.cost=Math.floor(h.cost*1.42+10);popText(W*.72,110,'LEVEL UP!');updateUI();renderPanel(currentPanel)}}
let currentPanel='heroes';
function setPanel(p){currentPanel=p;renderPanel(p)}
function renderPanel(p){
 const el=document.getElementById('heroes');
 if(p==='heroes') el.innerHTML=heroes.map((h,i)=>`<div class="card"><div class="avatar">${h.icon}</div><div>${h.name}<small>Lv ${h.lvl} • +${fmt(h.dps)} DPS</small></div><button class="buy" onclick="buyHero(${i})">${fmt(h.cost)}</button></div>`).join('');
 if(p==='skills') el.innerHTML=`<div class="card"><div class="avatar">⚡</div><div>Tap Gücü<small>Her tık +${clickPower} hasar</small></div><button class="buy" onclick="upgradeTap()">${fmt(tapCost())}</button></div><div class="card"><div class="avatar">💥</div><div>Kritik<small>%20 ihtimal 3x hasar</small></div><button class="buy">Açık</button></div>`;
 if(p==='areas') el.innerHTML=areas.map((a,i)=>`<div class="card"><div class="avatar">${['🏜️','🌌','🌴','🌋'][i]}</div><div>${a.name}<small>${zone%areas.length===i+1?'Şu an buradasın':'Boss kes, ilerle'}</small></div><button class="buy">Bölge</button></div>`).join('');
}
function tapCost(){return Math.floor(35*Math.pow(1.55,clickPower/8-1))}
function upgradeTap(){let c=tapCost();if(gold>=c){gold-=c;clickPower+=8;updateUI();renderPanel('skills')}}

function drawRoundRect(x,y,w,h,r,fill){ctx.fillStyle=fill;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill()}
function drawIsland(a){
 const cx=W*.5, cy=H*.56, iw=Math.min(430,W*.72), ih=120;
 ctx.save();ctx.translate(cx,cy);
 ctx.fillStyle='rgba(0,0,0,.18)';ctx.beginPath();ctx.ellipse(0,95,iw*.45,35,0,0,Math.PI*2);ctx.fill();
 ctx.fillStyle=a.edge;ctx.beginPath();ctx.moveTo(-iw/2,0);ctx.lineTo(iw/2,0);ctx.lineTo(iw*.36,ih);ctx.lineTo(-iw*.36,ih);ctx.closePath();ctx.fill();
 for(let i=-8;i<9;i++){ctx.fillStyle=i%2?a.edge:'#0002';ctx.beginPath();ctx.moveTo(i*iw/18,10);ctx.lineTo(i*iw/18+18,ih*.9);ctx.lineTo(i*iw/18-10,ih*.82);ctx.closePath();ctx.fill()}
 ctx.fillStyle=a.ground;ctx.beginPath();ctx.ellipse(0,0,iw/2,72,0,0,Math.PI*2);ctx.fill();
 ctx.strokeStyle='#fff5';ctx.lineWidth=3;ctx.stroke();
 for(let i=0;i<6;i++){drawTree(-iw*.35+i*iw*.14,-20+Math.sin(i)*18,a.deco)}
 ctx.restore();
}
function drawTree(x,y,c){ctx.save();ctx.translate(W*.5+x,H*.56+y);ctx.fillStyle='#72421f';ctx.fillRect(-5,6,10,40);ctx.fillStyle=c;for(let i=0;i<7;i++){ctx.beginPath();ctx.ellipse(Math.cos(i)*18,Math.sin(i*2)*8,18,30,i,0,Math.PI*2);ctx.fill()}ctx.restore()}
function drawBoss(dt){
 const x=W*.5,y=H*.42; boss.x=x;boss.y=y; boss.scale+=((1)-boss.scale)*.18; boss.rot=Math.sin(performance.now()/450)*.04;
 ctx.save();ctx.translate(x,y);ctx.rotate(boss.rot);ctx.scale(boss.scale,boss.scale);
 ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,92,95,22,0,0,Math.PI*2);ctx.fill();
 ctx.fillStyle=boss.color;ctx.strokeStyle='#fff8';ctx.lineWidth=5;
 ctx.beginPath();ctx.ellipse(0,0,88,76,0,0,Math.PI*2);ctx.fill();ctx.stroke();
 ctx.fillStyle=boss.accent;ctx.beginPath();ctx.ellipse(-35,-18,26,18,.4,0,Math.PI*2);ctx.ellipse(35,-18,26,18,-.4,0,Math.PI*2);ctx.fill();
 ctx.fillStyle='#1d1020';ctx.beginPath();ctx.arc(-30,-15,8,0,Math.PI*2);ctx.arc(30,-15,8,0,Math.PI*2);ctx.fill();
 ctx.strokeStyle='#3b1010';ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,20,35,.1,Math.PI-.1);ctx.stroke();
 ctx.font='54px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(boss.emoji,0,-4);
 for(let i=0;i<5;i++){ctx.fillStyle=boss.accent;ctx.beginPath();ctx.moveTo(-50+i*25,62);ctx.lineTo(-40+i*25,86);ctx.lineTo(-30+i*25,62);ctx.fill()}
 ctx.restore();
}
function drawHeroLine(){
 const y=H-112; ctx.save();
 heroes.forEach((h,i)=>{if(h.lvl<=0)return; const x=70+i*70; drawRoundRect(x-28,y-28,56,56,16,'rgba(255,224,88,.85)');ctx.font='30px Arial';ctx.textAlign='center';ctx.fillText(h.icon,x,y+9);ctx.fillStyle='white';ctx.font='12px Arial';ctx.fillText('Lv '+h.lvl,x,y+30)});
 ctx.restore();
}
function background(){
 const a=areas[(zone-1)%areas.length];
 const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,a.sky[0]);g.addColorStop(1,a.sky[1]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.fillStyle='rgba(255,255,255,.75)';
 for(let i=0;i<12;i++){let x=(i*173+performance.now()/40)%(W+220)-110;let y=80+(i%4)*70;ctx.beginPath();ctx.ellipse(x,y,48,18,0,0,Math.PI*2);ctx.ellipse(x+35,y+7,38,15,0,0,Math.PI*2);ctx.ellipse(x-35,y+8,30,13,0,0,Math.PI*2);ctx.fill()}
 drawIsland(a);
}
function damage(amount,x,y){
 boss.hp-=amount;boss.scale=1.08;shake=8;particlesBurst(x,y,boss.accent);popText(x,y,'-'+fmt(amount));
 if(boss.hp<=0){gold+=Math.floor(18*Math.pow(1.26,zone));coinsBurst(boss.x,boss.y);zone++;spawnBoss()}
 updateUI();
}
function particlesBurst(x,y,color){for(let i=0;i<18;i++)particles.push({x,y,vx:(Math.random()-.5)*7,vy:(Math.random()-.8)*7,life:1,color})}
function coinsBurst(x,y){for(let i=0;i<14;i++)coins.push({x,y,vx:(Math.random()-.5)*8,vy:-Math.random()*8-2,life:1})}
function popText(x,y,t){const d=document.createElement('div');d.className='float';d.style.left=x+'px';d.style.top=y+'px';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),800)}
function updateParticles(){
 particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.22;p.life-=.035;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1});particles=particles.filter(p=>p.life>0);
 coins.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.28;p.life-=.025;ctx.globalAlpha=Math.max(0,p.life);ctx.font='24px Arial';ctx.fillText('🪙',p.x,p.y);ctx.globalAlpha=1});coins=coins.filter(p=>p.life>0)
}
function updateUI(){
 document.getElementById('gold').textContent=fmt(gold);
 document.getElementById('dps').textContent=fmt(totalDps());
 document.getElementById('zone').textContent=zone;
 document.getElementById('bossName').textContent=`${areas[(zone-1)%areas.length].name} • ${boss.name} Lv ${zone} • ${fmt(Math.max(0,boss.hp))}/${fmt(boss.maxHp)}`;
 document.getElementById('hpfill').style.width=Math.max(0,boss.hp/boss.maxHp*100)+'%';
}
function loop(t){
 const dt=Math.min(.05,(t-last)/1000);last=t;
 if(totalDps()>0 && boss.hp>0) damage(totalDps()*dt,boss.x,boss.y-40);
 ctx.save(); if(shake>0){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.82}
 background();drawBoss(dt);drawHeroLine();updateParticles();ctx.restore();
 requestAnimationFrame(loop);
}
function pointer(e){
 const r=canvas.getBoundingClientRect();let x=(e.touches?e.touches[0].clientX:e.clientX)-r.left,y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
 const dx=x-boss.x,dy=y-boss.y;if(Math.hypot(dx,dy)<115){let crit=Math.random()<.2;damage(crit?clickPower*3:clickPower,x,y);if(crit)popText(x,y-25,'CRIT!')}
}
canvas.addEventListener('pointerdown',pointer);
renderPanel('heroes');spawnBoss();requestAnimationFrame(loop);
</script>
</body>
</html>
