<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BeastVale - 100 Creature Catch</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#03060b;color:white;font-family:Arial,Helvetica,sans-serif}
canvas{display:block;width:100%;height:100%}
#menu{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 25%,#14382e 0%,#06101a 38%,#02040a 100%)}
.card{width:min(92vw,760px);padding:28px;border-radius:30px;background:linear-gradient(180deg,rgba(26,40,64,.88),rgba(5,9,18,.92));border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 90px #000;text-align:center}
.logo{font-size:clamp(42px,8vw,82px);font-weight:1000;letter-spacing:-4px;line-height:.9}.logo span{color:#80ffd4;text-shadow:0 0 30px #4dffbf}
.sub{color:#d7e7f5;font-weight:700;line-height:1.45;max-width:600px;margin:18px auto 24px}
.start{border:0;border-radius:20px;padding:16px 34px;font-size:18px;font-weight:1000;color:#061016;background:linear-gradient(90deg,#77ffd4,#93a8ff);box-shadow:0 15px 40px rgba(117,255,212,.28)}
#hud{position:fixed;inset:0;z-index:5;pointer-events:none}
.top{position:absolute;left:12px;top:10px;display:flex;gap:8px;flex-wrap:wrap}.pill{padding:9px 12px;border-radius:999px;background:rgba(7,12,22,.72);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(10px);font-size:13px;font-weight:900}.pill b{color:#91ffd8}
.tip{position:absolute;left:50%;top:58px;transform:translateX(-50%);max-width:90vw;padding:10px 14px;border-radius:16px;background:rgba(5,10,18,.7);border:1px solid rgba(255,255,255,.12);font-size:13px;font-weight:800;text-align:center}
.cross{position:absolute;left:50%;top:50%;width:18px;height:18px;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,.75);border-radius:50%;box-shadow:0 0 20px rgba(114,255,214,.35)}
#joy{position:absolute;left:22px;bottom:24px;width:136px;height:136px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);pointer-events:auto;touch-action:none;box-shadow:0 10px 40px #000}
#stick{position:absolute;left:50%;top:50%;width:58px;height:58px;border-radius:50%;transform:translate(-50%,-50%);background:linear-gradient(180deg,#eafff8,#64e9c2);box-shadow:0 0 30px rgba(111,255,209,.5)}
.buttons{position:absolute;right:18px;bottom:20px;display:grid;grid-template-columns:74px 74px;gap:12px;pointer-events:auto}.btn{width:74px;height:74px;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:rgba(255,255,255,.12);color:white;font-weight:1000;box-shadow:0 10px 35px #000;backdrop-filter:blur(12px)}.btn:active{transform:scale(.95)}.catch{background:linear-gradient(180deg,rgba(101,255,193,.32),rgba(28,130,96,.35))}.scan{background:linear-gradient(180deg,rgba(122,166,255,.32),rgba(44,67,139,.35))}.dash{background:linear-gradient(180deg,rgba(255,199,95,.32),rgba(157,83,24,.35))}.cam{background:linear-gradient(180deg,rgba(255,118,196,.32),rgba(111,32,87,.35))}
.toast{position:absolute;left:50%;bottom:174px;transform:translateX(-50%);padding:12px 16px;border-radius:16px;background:rgba(4,8,15,.82);border:1px solid rgba(255,255,255,.15);font-weight:1000;opacity:0;transition:.25s;text-align:center;max-width:88vw}.toast.show{opacity:1;bottom:188px}
.panel{position:absolute;right:14px;top:10px;width:270px;max-width:43vw;padding:12px;border-radius:22px;background:rgba(5,10,18,.68);border:1px solid rgba(255,255,255,.13);backdrop-filter:blur(10px)}.panel h3{margin:0 0 8px;font-size:14px}.slots{display:flex;gap:6px;flex-wrap:wrap}.slot{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);display:flex;align-items:center;justify-content:center;font-weight:1000;color:#93ffd9}
@media(max-width:720px){.panel{display:none}.tip{top:54px}.top{left:8px}.pill{font-size:12px;padding:8px 10px}.buttons{grid-template-columns:68px 68px}.btn{width:68px;height:68px;border-radius:22px}#joy{width:128px;height:128px}}
</style>
</head>
<body>
<div id="menu"><div class="card"><div class="logo">BEAST<span>VALE</span></div><div class="sub">Koyu ormanda 100 farklı çizimli yaratık bul, yaklaş, tara ve yakala. PNG yok; yaratıkların hepsi Three.js geometrileriyle çiziliyor.</div><button class="start" id="start">OYUNA BAŞLA</button></div></div>
<div id="hud">
 <div class="top"><div class="pill">HP <b id="hp">100</b></div><div class="pill">Enerji <b id="en">100</b></div><div class="pill">Yakalanan <b id="caught">0</b>/100</div><div class="pill">Hedef <b id="target">Yok</b></div></div>
 <div class="tip" id="tip">WASD / joystick ile gez. SCAN hedef seçer, CATCH yakalama atar, CAM kamera değiştirir.</div>
 <div class="cross"></div>
 <div class="panel"><h3>Takım</h3><div class="slots" id="slots"></div></div>
 <div id="joy"><div id="stick"></div></div>
 <div class="buttons"><button class="btn dash" id="dash">DASH</button><button class="btn scan" id="scan">SCAN</button><button class="btn cam" id="cam">CAM</button><button class="btn catch" id="catch">CATCH</button></div>
 <div class="toast" id="toast"></div>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x03070d);scene.fog=new THREE.FogExp2(0x06111d,.026);
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,800);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,1.7));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;renderer.toneMapping=THREE.ACESFilmicToneMapping;document.body.appendChild(renderer.domElement);
const clock=new THREE.Clock();
const hemi=new THREE.HemisphereLight(0xb9d7ff,0x102015,1.25);scene.add(hemi);
const moon=new THREE.DirectionalLight(0xc4dbff,2.2);moon.position.set(-40,70,30);moon.castShadow=true;moon.shadow.mapSize.set(2048,2048);moon.shadow.camera.left=-90;moon.shadow.camera.right=90;moon.shadow.camera.top=90;moon.shadow.camera.bottom=-90;scene.add(moon);
const cyan=new THREE.PointLight(0x72ffd6,2,45);cyan.position.set(0,8,0);scene.add(cyan);
const root=new THREE.Group();scene.add(root);
const keys=new Set(),beasts=[],balls=[],sparks=[];let started=false,camMode=0,target=null,caught=[],energy=100,hp=100,yaw=0,pitch=.15,dashCD=0,catchCD=0,scanPulse=0;
const player={pos:new THREE.Vector3(0,1.65,8),vel:new THREE.Vector3(),speed:7};
const ui={hp:gid('hp'),en:gid('en'),caught:gid('caught'),target:gid('target'),toast:gid('toast'),slots:gid('slots'),stick:gid('stick'),joy:gid('joy')};function gid(x){return document.getElementById(x)}
function toast(t){ui.toast.textContent=t;ui.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>ui.toast.classList.remove('show'),1500)}
function material(c,em=0){return new THREE.MeshStandardMaterial({color:c,roughness:.72,metalness:.05,emissive:c,emissiveIntensity:em})}
function add(m,g){m.castShadow=m.receiveShadow=true;g.add(m);return m}
const groundMat=new THREE.MeshStandardMaterial({color:0x0b1d14,roughness:.95});const ground=new THREE.Mesh(new THREE.PlaneGeometry(260,260,96,96),groundMat);ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;root.add(ground);
const grid=new THREE.GridHelper(260,52,0x1d4536,0x10251d);grid.position.y=.012;grid.material.transparent=true;grid.material.opacity=.28;root.add(grid);
function tree(x,z,s){const g=new THREE.Group();const trunk=add(new THREE.Mesh(new THREE.CylinderGeometry(.18*s,.35*s,2.2*s,7),material(0x2b1b12)),g);trunk.position.y=1.1*s;const leaf=add(new THREE.Mesh(new THREE.ConeGeometry(1.25*s,3.4*s,8),material(0x0f3b2b,.03)),g);leaf.position.y=3*s;const leaf2=add(new THREE.Mesh(new THREE.ConeGeometry(1.0*s,2.5*s,8),material(0x13523b,.04)),g);leaf2.position.y=4.1*s;g.position.set(x,0,z);root.add(g)}
for(let i=0;i<220;i++){const r=25+Math.random()*95,a=Math.random()*Math.PI*2;if(Math.random()<.75)tree(Math.cos(a)*r,Math.sin(a)*r,.65+Math.random()*1.1)}
for(let i=0;i<140;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(.035+Math.random()*.05,6,6),material(0x7bffd5,.7));p.position.set((Math.random()-.5)*120,1+Math.random()*10,(Math.random()-.5)*120);root.add(p);sparks.push({m:p,v:Math.random()*2})}
function makePlayer(){const g=new THREE.Group();add(new THREE.Mesh(new THREE.CapsuleGeometry(.38,1.0,7,14),material(0x83a6ff,.03)),g).position.y=.9;add(new THREE.Mesh(new THREE.SphereGeometry(.28,16,16),material(0xf1d0a5)),g).position.y=1.75;const eye=add(new THREE.Mesh(new THREE.BoxGeometry(.36,.06,.04),material(0x07121c,.25)),g);eye.position.set(0,1.78,.25);root.add(g);return g}const playerMesh=makePlayer();
const names=['Umbra','Pyro','Aqua','Terra','Volt','Luma','Fang','Moss','Rune','Nox','Blitz','Crag','Mist','Vine','Frost','Ember','Tide','Gloom','Nova','Claw'];
function makeBeast(i){const g=new THREE.Group();const hue=i*3.6,base=new THREE.Color(`hsl(${hue},78%,52%)`),dark=new THREE.Color(`hsl(${hue},70%,28%)`),light=new THREE.Color(`hsl(${(hue+45)%360},85%,70%)`);const type=i%10;
 const bodyGeo=[new THREE.SphereGeometry(.52,18,18),new THREE.BoxGeometry(.8,.65,.8),new THREE.CapsuleGeometry(.36,.7,8,16),new THREE.DodecahedronGeometry(.56,0)][i%4];
 const body=add(new THREE.Mesh(bodyGeo,material(base,.08)),g);body.position.y=.72;
 const head=add(new THREE.Mesh(new THREE.SphereGeometry(.32,16,16),material(light,.07)),g);head.position.set(0,.98,.42);
 const eyeMat=material(0x041014,.2);[-.12,.12].forEach(x=>{const e=add(new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),eyeMat),g);e.position.set(x,1.03,.71)});
 for(let k=-1;k<=1;k+=2){const leg=add(new THREE.Mesh(new THREE.CapsuleGeometry(.08,.35,5,8),material(dark)),g);leg.position.set(.22*k,.24,.18);const leg2=add(new THREE.Mesh(new THREE.CapsuleGeometry(.08,.35,5,8),material(dark)),g);leg2.position.set(.22*k,.24,-.2)}
 if(i%2===0){for(let k=-1;k<=1;k+=2){const h=add(new THREE.Mesh(new THREE.ConeGeometry(.09,.38,8),material(0xf5ffe9,.05)),g);h.position.set(.16*k,1.28,.36);h.rotation.x=-.25;}}
 if(i%3===0){for(let k=-1;k<=1;k+=2){const w=add(new THREE.Mesh(new THREE.ConeGeometry(.2,.85,3),material(light,.12)),g);w.position.set(.62*k,.75,-.02);w.rotation.z=k*1.35;w.rotation.y=k*.55;}}
 if(i%4===0){const tail=add(new THREE.Mesh(new THREE.ConeGeometry(.12,.75,9),material(dark,.06)),g);tail.position.set(0,.72,-.58);tail.rotation.x=-Math.PI/2.4;}
 if(i%5===0){const aura=add(new THREE.Mesh(new THREE.TorusGeometry(.56,.025,8,36),material(light,.6)),g);aura.position.y=.72;aura.rotation.x=Math.PI/2;g.userData.aura=aura;}
 if(i%7===0){const crest=add(new THREE.Mesh(new THREE.BoxGeometry(.1,.42,.12),material(0xffffff,.18)),g);crest.position.set(0,1.32,.18);}
 const r=16+Math.random()*80,a=Math.random()*Math.PI*2;g.position.set(Math.cos(a)*r,.05,Math.sin(a)*r);g.scale.setScalar(.75+Math.random()*.7);g.userData={id:i,name:names[i%names.length]+'-'+String(i+1).padStart(3,'0'),rare:1+(i%5),rate:.68-(i%5)*.08,ang:Math.random()*6.28,spd:.35+Math.random()*.6,home:g.position.clone(),caught:false,wiggle:Math.random()*10,type};root.add(g);beasts.push(g)}
for(let i=0;i<100;i++)makeBeast(i);
function scan(){let best=null,bd=999;for(const b of beasts){if(b.userData.caught)continue;const d=b.position.distanceTo(player.pos);if(d<bd){bd=d;best=b}}target=bd<18?best:null;scanPulse=1;if(target){ui.target.textContent=target.userData.name;toast('Hedef: '+target.userData.name+' | Nadirlik '+target.userData.rare)}else{ui.target.textContent='Yok';toast('Yakında yaratık yok')}}
function catchBeast(){if(catchCD>0)return;catchCD=1.1;if(!target){scan();if(!target)return}const d=target.position.distanceTo(player.pos);if(d>13){toast('Daha yaklaş!');return}const ball=new THREE.Mesh(new THREE.SphereGeometry(.16,16,16),material(0x9cffdc,.9));ball.position.copy(player.pos).add(new THREE.Vector3(0,.2,0));root.add(ball);balls.push({m:ball,t:target,life:0,from:ball.position.clone(),to:target.position.clone().add(new THREE.Vector3(0,.9,0))})}
function finishCatch(t){const d=t.position.distanceTo(player.pos);let chance=t.userData.rate+(13-d)*.025;if(Math.random()<chance){t.userData.caught=true;t.visible=false;caught.push(t);ui.caught.textContent=caught.length;toast('YAKALANDI: '+t.userData.name+'!');renderSlots();target=null;ui.target.textContent='Yok'}else{toast(t.userData.name+' kaçtı! Tekrar dene.');t.position.add(new THREE.Vector3((Math.random()-.5)*4,0,(Math.random()-.5)*4))}}
function renderSlots(){ui.slots.innerHTML='';caught.slice(0,6).forEach((b,i)=>{const s=document.createElement('div');s.className='slot';s.textContent=b.userData.id+1;ui.slots.appendChild(s)})}
function dash(){if(dashCD>0||energy<24)return;dashCD=.75;energy-=24;const f=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));player.pos.addScaledVector(f,-4.2);toast('Dash!')}
gid('start').onclick=()=>{started=true;gid('menu').style.display='none';toast('Av başladı!')};gid('scan').onclick=scan;gid('catch').onclick=catchBeast;gid('dash').onclick=dash;gid('cam').onclick=()=>{camMode=(camMode+1)%3;toast(camMode===0?'3. kişi kamera':camMode===1?'Yakın kamera':'1. kişi kamera')};
addEventListener('keydown',e=>{keys.add(e.key.toLowerCase());if(e.key===' ')catchBeast();if(e.key.toLowerCase()==='e')scan();if(e.key.toLowerCase()==='shift')dash()});addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
let joyId=null;ui.joy.addEventListener('pointerdown',e=>{joyId=e.pointerId;ui.joy.setPointerCapture(joyId);moveJoy(e)});ui.joy.addEventListener('pointermove',e=>{if(e.pointerId===joyId)moveJoy(e)});ui.joy.addEventListener('pointerup',e=>{joyId=null;joy.x=joy.y=0;ui.stick.style.transform='translate(-50%,-50%)'});const joy={x:0,y:0};function moveJoy(e){const r=ui.joy.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let x=e.clientX-cx,y=e.clientY-cy;const len=Math.hypot(x,y),max=45;if(len>max){x=x/len*max;y=y/len*max}joy.x=x/max;joy.y=y/max;ui.stick.style.transform=`translate(calc(-50% + ${x}px),calc(-50% + ${y}px))`}
let drag=false,lx=0,ly=0;renderer.domElement.addEventListener('pointerdown',e=>{if(e.target!==renderer.domElement)return;drag=true;lx=e.clientX;ly=e.clientY});addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;yaw-=dx*.004;pitch=Math.max(-.35,Math.min(.55,pitch-dy*.003))});addEventListener('pointerup',()=>drag=false);
function update(dt){if(!started)return;dashCD=Math.max(0,dashCD-dt);catchCD=Math.max(0,catchCD-dt);energy=Math.min(100,energy+dt*10);ui.en.textContent=Math.floor(energy);ui.hp.textContent=Math.floor(hp);
 let mx=0,my=0;if(keys.has('w'))my-=1;if(keys.has('s'))my+=1;if(keys.has('a'))mx-=1;if(keys.has('d'))mx+=1;mx+=joy.x;my+=joy.y;if(keys.has('arrowleft'))yaw+=dt*1.8;if(keys.has('arrowright'))yaw-=dt*1.8;
 const forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));const move=new THREE.Vector3().addScaledVector(forward,-my).addScaledVector(right,mx);if(move.length()>1)move.normalize();player.pos.addScaledVector(move,player.speed*dt);player.pos.x=Math.max(-118,Math.min(118,player.pos.x));player.pos.z=Math.max(-118,Math.min(118,player.pos.z));
 playerMesh.position.copy(player.pos).add(new THREE.Vector3(0,-1.65,0));playerMesh.rotation.y=yaw;
 beasts.forEach(b=>{if(b.userData.caught)return;b.userData.wiggle+=dt*3;b.rotation.y+=dt*(.6+b.userData.type*.03);b.position.y=.05+Math.sin(b.userData.wiggle)*.08;if(b.userData.aura)b.userData.aura.rotation.z+=dt*2;const toHome=b.userData.home.clone().sub(b.position);b.position.addScaledVector(toHome,dt*.04);b.position.x+=Math.sin(performance.now()*.0004+b.userData.ang)*dt*b.userData.spd;b.position.z+=Math.cos(performance.now()*.00035+b.userData.ang)*dt*b.userData.spd});
 balls.forEach((o,i)=>{o.life+=dt*1.7;const t=Math.min(1,o.life);o.m.position.lerpVectors(o.from,o.to,t);o.m.position.y+=Math.sin(t*Math.PI)*2.2;o.m.scale.setScalar(1+Math.sin(t*Math.PI)*.55);if(t>=1){root.remove(o.m);balls.splice(i,1);finishCatch(o.t)}});
 sparks.forEach(s=>{s.m.position.y+=dt*(.25+s.v*.15);s.m.rotation.y+=dt;if(s.m.position.y>11)s.m.position.y=.8});
 if(!target||target.userData.caught){let best=null,bd=999;for(const b of beasts){if(b.userData.caught)continue;const d=b.position.distanceTo(player.pos);if(d<bd){bd=d;best=b}}if(best&&bd<8){target=best;ui.target.textContent=best.userData.name}}
 const camTarget=player.pos.clone();if(camMode===2){camera.position.copy(player.pos).add(new THREE.Vector3(0,.15,0));camera.rotation.set(pitch,yaw+Math.PI,0,'YXZ')}else{const dist=camMode===0?8:4.4,high=camMode===0?4.2:2.4;const back=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw)).multiplyScalar(dist);camera.position.lerp(camTarget.clone().add(back).add(new THREE.Vector3(0,high,0)),1-Math.pow(.001,dt));camera.lookAt(camTarget.clone().add(new THREE.Vector3(0,1.2,0)))}
}
function loop(){const dt=Math.min(.033,clock.getDelta());update(dt);renderer.render(scene,camera);requestAnimationFrame(loop)}loop();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)})
</script>
</body>
</html>
