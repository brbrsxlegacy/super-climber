<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WILD ROOMS</title>

<style>
:root{
  --text:#f2fff7;
  --muted:#a6c2b2;
  --line:rgba(255,255,255,.15);
  --good:#65ffad;
  --bad:#ff7189;
  --blue:#8bd8ff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#030806;
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  touch-action:none;
}

canvas{display:block}
.hidden{display:none!important}

.screen{
  position:fixed;
  inset:0;
  z-index:40;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:
    radial-gradient(circle at 15% 12%,rgba(101,255,173,.20),transparent 28%),
    radial-gradient(circle at 82% 20%,rgba(139,216,255,.13),transparent 30%),
    rgba(1,5,4,.82);
  backdrop-filter:blur(18px);
}

.card{
  width:min(1080px,100%);
  border:1px solid var(--line);
  border-radius:32px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.045));
  box-shadow:0 30px 90px rgba(0,0,0,.58);
  overflow:hidden;
}

.hero{
  display:grid;
  grid-template-columns:1fr .92fr;
  gap:22px;
  padding:34px;
}

.badge{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 13px;
  border-radius:999px;
  border:1px solid rgba(101,255,173,.35);
  background:rgba(101,255,173,.12);
  font-size:13px;
  font-weight:950;
  margin-bottom:16px;
}

h1{
  font-size:clamp(42px,8vw,92px);
  line-height:.86;
  letter-spacing:-5px;
  margin:0 0 18px;
  text-shadow:0 16px 50px rgba(0,0,0,.45);
}

h2{
  font-size:38px;
  margin:0 0 8px;
  letter-spacing:-1.4px;
}

p{
  margin:0 0 18px;
  color:var(--muted);
  line-height:1.55;
}

.small{
  font-size:13px;
  color:var(--muted);
}

button,input{
  font:inherit;
  border:0;
  outline:0;
}

button{
  cursor:pointer;
  border-radius:17px;
  padding:13px 18px;
  font-weight:950;
  color:#04100a;
  background:linear-gradient(135deg,#fff,#94ffd0 55%,#8bd8ff);
  box-shadow:0 14px 34px rgba(62,255,165,.18);
  transition:.15s;
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.06);
}

button.secondary{
  color:var(--text);
  background:rgba(255,255,255,.09);
  border:1px solid var(--line);
  box-shadow:none;
}

input{
  width:100%;
  color:var(--text);
  background:rgba(0,0,0,.32);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin:8px 0;
}

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:22px;
}

.menuGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}

.mode{
  padding:18px;
  border-radius:22px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  min-height:142px;
}

.mode b{
  display:block;
  font-size:18px;
  margin-bottom:6px;
}

.preview{
  min-height:465px;
  border-radius:26px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(18,54,43,.9),rgba(2,9,7,.98));
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 0 95px rgba(101,255,173,.08);
}

.moon{
  position:absolute;
  right:78px;
  top:58px;
  width:108px;
  height:108px;
  border-radius:50%;
  background:#e8fff4;
  box-shadow:0 0 55px rgba(232,255,244,.52);
}

.hill{
  position:absolute;
  bottom:-20px;
  width:130%;
  height:58%;
  left:-15%;
  background:linear-gradient(180deg,#183d30,#06120d);
  clip-path:polygon(0 100%,0 58%,12% 36%,24% 49%,39% 19%,54% 48%,68% 26%,85% 52%,100% 29%,100% 100%);
}

.forestLine{
  position:absolute;
  bottom:75px;
  left:0;
  width:100%;
  height:170px;
  background:repeating-linear-gradient(90deg,transparent 0 18px,rgba(2,16,11,.82) 18px 31px);
  clip-path:polygon(0 100%,0 45%,4% 70%,9% 35%,14% 72%,20% 30%,26% 76%,32% 41%,38% 78%,44% 28%,50% 80%,57% 35%,64% 74%,70% 24%,77% 80%,84% 34%,91% 74%,100% 41%,100% 100%);
}

.fog{
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 35%,rgba(5,13,11,.86) 100%);
}

.orbDemo{
  position:absolute;
  left:70px;
  bottom:92px;
  width:92px;
  height:92px;
  border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#fff,#ffdf75 18%,#ff7a7a 42%,#5b1424 100%);
  box-shadow:0 0 45px rgba(255,110,134,.5);
}

.monsterDemo{
  position:absolute;
  right:120px;
  bottom:95px;
  width:135px;
  height:115px;
  border-radius:50% 50% 42% 42%;
  background:radial-gradient(circle at 35% 35%,#dfffea,#4cff9a 35%,#11713c);
  box-shadow:0 18px 50px rgba(0,0,0,.35);
  animation:bob 1.8s infinite ease-in-out;
}

.monsterDemo:before,
.monsterDemo:after{
  content:"";
  position:absolute;
  width:22px;
  height:22px;
  background:#06100d;
  border-radius:50%;
  top:34px;
}

.monsterDemo:before{left:36px}
.monsterDemo:after{right:36px}

@keyframes bob{
  50%{transform:translateY(-10px)}
}

#hud{
  position:fixed;
  inset:0;
  z-index:10;
  pointer-events:none;
  display:none;
}

.pill{
  pointer-events:auto;
  background:rgba(2,10,7,.58);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(12px);
  border-radius:17px;
  padding:10px 12px;
  font-size:13px;
  color:var(--text);
  box-shadow:0 12px 30px rgba(0,0,0,.24);
}

#topHud{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.crosshair{
  position:absolute;
  left:50%;
  top:50%;
  width:10px;
  height:10px;
  transform:translate(-50%,-50%);
  border:2px solid rgba(255,255,255,.65);
  border-radius:50%;
  box-shadow:0 0 18px rgba(101,255,173,.75);
}

#centerHint{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  text-shadow:0 2px 14px #000;
  opacity:.92;
}

.bottomPanel{
  position:absolute;
  left:50%;
  bottom:18px;
  transform:translateX(-50%);
  width:min(760px,92vw);
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  align-items:end;
}

.inv{
  display:flex;
  gap:8px;
  overflow:hidden;
}

.slot{
  min-width:58px;
  height:58px;
  border-radius:17px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.32);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:27px;
  box-shadow:0 10px 24px rgba(0,0,0,.22);
}

.catchBtn{
  pointer-events:auto;
  border-radius:20px;
  padding:15px 18px;
  color:#07100c;
  background:linear-gradient(135deg,#fff,#ffdc70,#ff738a);
  font-weight:950;
}

.dexBtn{
  pointer-events:auto;
  border-radius:20px;
  padding:15px 16px;
  color:var(--text);
  background:rgba(255,255,255,.12);
  border:1px solid var(--line);
}

#mobileControls{
  display:none;
  position:absolute;
  inset:0;
  pointer-events:none;
}

.touchZone{
  position:absolute;
  bottom:24px;
  pointer-events:auto;
}

#joy{
  left:20px;
  width:156px;
  height:156px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.10),rgba(255,255,255,.045));
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 18px 45px rgba(0,0,0,.25);
}

#knob{
  position:absolute;
  width:52px;
  height:52px;
  border-radius:50%;
  background:rgba(255,255,255,.40);
  box-shadow:0 10px 28px rgba(0,0,0,.22),inset 0 0 18px rgba(255,255,255,.25);
}

#lookPad{
  position:absolute;
  right:0;
  top:0;
  width:58%;
  height:100%;
  pointer-events:auto;
}

.touchBtn{
  right:18px;
  width:142px;
  display:grid;
  gap:10px;
  background:transparent;
}

.touchBtn button{
  pointer-events:auto;
  padding:14px 12px;
  border-radius:20px;
  color:var(--text);
  background:rgba(255,255,255,.13);
  border:1px solid var(--line);
  box-shadow:0 10px 28px rgba(0,0,0,.2);
}

#toast{
  position:fixed;
  left:50%;
  top:20px;
  transform:translateX(-50%);
  z-index:60;
  background:#06100d;
  border:1px solid var(--line);
  padding:12px 16px;
  border-radius:999px;
  display:none;
}

.dex{
  position:fixed;
  right:14px;
  top:68px;
  z-index:12;
  width:280px;
  max-height:56vh;
  overflow:auto;
  display:none;
  pointer-events:auto;
  background:rgba(2,10,7,.72);
  border:1px solid var(--line);
  border-radius:22px;
  padding:12px;
  backdrop-filter:blur(12px);
}

.dex h3{margin:0 0 8px}

.dexItem{
  display:flex;
  justify-content:space-between;
  gap:8px;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.08);
  font-size:13px;
}

.dexItem span:last-child{color:var(--good)}

@media(max-width:820px){
  .hero{grid-template-columns:1fr;padding:20px}
  .preview{min-height:205px}
  h1{letter-spacing:-2px}
  .menuGrid{grid-template-columns:1fr}
  .pill{font-size:12px}
  #mobileControls{display:block}
  .bottomPanel{bottom:188px;grid-template-columns:1fr auto}
  .dexBtn{display:none}
  .catchBtn{padding:12px 14px}
  .slot{min-width:46px;height:46px;font-size:22px}
  .dex{left:14px;right:14px;width:auto;top:72px}
}
</style>
</head>
<body>

<div id="menu" class="screen">
  <div class="card">
    <div class="hero">
      <div>
        <div class="badge">🌙 WILD ROOMS</div>
        <h1>CREATURE<br>CATCH</h1>
        <p>Koyu ormanda dolaş, yaratıkları bul ve yakala.</p>
        <div class="actions">
          <button id="startBtn">BAŞLA</button>
        </div>
      </div>

      <div class="preview">
        <div class="moon"></div>
        <div class="forestLine"></div>
        <div class="hill"></div>
        <div class="orbDemo"></div>
        <div class="monsterDemo"></div>
        <div class="fog"></div>
      </div>
    </div>
  </div>
</div>

<div id="hud">
  <div id="topHud">
    <div class="pill" id="statusPill">Hazır</div>
  </div>

  <div class="crosshair"></div>
  <div id="centerHint">Başlamak için tıkla</div>

  <div class="bottomPanel">
    <div class="inv" id="inv"></div>
    <button id="catchBtn" class="catchBtn">YAKALA</button>
  </div>

  <div id="mobileControls">
    <div id="lookPad"></div>

    <div id="joy" class="touchZone">
      <div id="knob"></div>
    </div>

    <div class="touchZone touchBtn">
      <button id="mCatchBtn">YAKALA</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

const $ = id => document.getElementById(id);

let scene, camera, renderer, player, velocity, clock;
let yaw = 0, pitch = 0;

let keys = {};
let joystick = {x:0,y:0,active:false};

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none',2000);
}

$('startBtn').onclick = startGame;

function startGame(){
  $('menu').classList.add('hidden');
  $('hud').style.display='block';
  initThree();
  animate();
}

function initThree(){

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050a08);
  scene.fog = new THREE.FogExp2(0x050a08,0.02);

  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,500);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  player = new THREE.Object3D();
  player.position.set(0,2,5);
  scene.add(player);

  velocity = new THREE.Vector3();

  const light = new THREE.HemisphereLight(0x88ffcc,0x001a11,1.2);
  scene.add(light);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x0d2f20})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // ağaçlar
  for(let i=0;i<80;i++){
    const tree = new THREE.Mesh(
      new THREE.ConeGeometry(1.5,4,8),
      new THREE.MeshStandardMaterial({color:0x062e1d})
    );
    tree.position.set((Math.random()-0.5)*100,2,(Math.random()-0.5)*100);
    scene.add(tree);
  }

  bindControls();
}

function bindControls(){

  document.addEventListener('keydown',e=>keys[e.code]=true);
  document.addEventListener('keyup',e=>keys[e.code]=false);

  document.addEventListener('mousemove',e=>{
    if(document.pointerLockElement !== renderer.domElement) return;
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-1,Math.min(1,pitch));
  });

  renderer.domElement.onclick = ()=>{
    renderer.domElement.requestPointerLock();
  };

  setupJoystick();
}

function setupJoystick(){

  const joy = $('joy');
  const knob = $('knob');

  joy.onpointerdown = e=>{
    joystick.active = true;
    moveJoy(e);
  };

  joy.onpointermove = e=>{
    if(!joystick.active) return;
    moveJoy(e);
  };

  joy.onpointerup = ()=>{
    joystick.active=false;
    joystick.x=0; joystick.y=0;
    knob.style.left='50px';
    knob.style.top='50px';
  };

  function moveJoy(e){
    const rect = joy.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;

    let dx = e.clientX - cx;
    let dy = e.clientY - cy;

    const max = 50;
    const d = Math.hypot(dx,dy);

    if(d>max){
      dx = dx/d*max;
      dy = dy/d*max;
    }

    joystick.x = dx/max;
    joystick.y = dy/max;

    knob.style.left = (50+dx)+'px';
    knob.style.top = (50+dy)+'px';
  }
}

function animate(){
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  updatePlayer(dt);

  renderer.render(scene,camera);
}

function updatePlayer(dt){

  let forward = new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
  let right = new THREE.Vector3(Math.cos(yaw),0,Math.sin(yaw));

  let mx=0,mz=0;

  if(keys.KeyW) mz+=1;
  if(keys.KeyS) mz-=1;
  if(keys.KeyD) mx+=1;
  if(keys.KeyA) mx-=1;

  mx += joystick.x;
  mz += -joystick.y;

  const speed = 5;

  player.position.addScaledVector(forward,mz*speed*dt);
  player.position.addScaledVector(right,mx*speed*dt);

  camera.position.copy(player.position);
  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}
//////////////////////////////////////////////////////
// 🔥 FIREBASE (ONLINE ODA)
//////////////////////////////////////////////////////

import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import { getDatabase, ref, set, update, onValue } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyABqkhpL1SMRzRJ9GQLjjZE2IryqpAvMPw",
  authDomain: "pixelroom-ae218.firebaseapp.com",
  databaseURL: "https://pixelroom-ae218-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pixelroom-ae218"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;
let room = "test";

signInAnonymously(auth).then(res=>{
  uid = res.user.uid;
});

//////////////////////////////////////////////////////
// 🧠 100 YARATIK SİSTEMİ
//////////////////////////////////////////////////////

let creatures = [];
let caught = [];

function spawnCreatures(){

  for(let i=0;i<100;i++){

    const color = new THREE.Color(`hsl(${(i*47)%360},70%,55%)`);

    const body = new THREE.Mesh(
      new THREE.SphereGeometry(0.5,16,12),
      new THREE.MeshStandardMaterial({color})
    );

    body.position.set(
      (Math.random()-0.5)*80,
      1,
      (Math.random()-0.5)*80
    );

    body.userData = {
      id:i,
      caught:false,
      phase:Math.random()*10
    };

    scene.add(body);
    creatures.push(body);
  }
}

spawnCreatures();

//////////////////////////////////////////////////////
// 🎯 YAKALAMA (TOP FIRLATMA)
//////////////////////////////////////////////////////

let balls = [];

function throwBall(){

  const dir = new THREE.Vector3(0,0,-1)
    .applyEuler(camera.rotation)
    .normalize();

  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,12,10),
    new THREE.MeshStandardMaterial({color:0xffccaa})
  );

  ball.position.copy(camera.position);
  ball.userData = {
    vel: dir.multiplyScalar(15),
    life:2
  };

  scene.add(ball);
  balls.push(ball);
}

$('catchBtn').onclick = throwBall;
$('mCatchBtn').onclick = throwBall;

//////////////////////////////////////////////////////
// 🧬 YARATIK HAREKET + YAKALAMA
//////////////////////////////////////////////////////

function updateCreatures(dt,time){

  for(let c of creatures){

    if(c.userData.caught) continue;

    c.position.x += Math.sin(time + c.userData.phase)*0.02;
    c.position.z += Math.cos(time + c.userData.phase)*0.02;
    c.position.y = 1 + Math.abs(Math.sin(time*2))*0.2;
    c.rotation.y += dt;

    // oyuncuya yakınsa bildir
    if(c.position.distanceTo(player.position) < 3){
      $('statusPill').textContent = "Yaratık yakın! YAKALA!";
    }
  }
}

//////////////////////////////////////////////////////
// 💥 TOP UPDATE
//////////////////////////////////////////////////////

function updateBalls(dt){

  for(let b of [...balls]){

    b.userData.life -= dt;
    b.position.addScaledVector(b.userData.vel,dt);

    for(let c of creatures){

      if(!c.userData.caught && b.position.distanceTo(c.position) < 1){

        if(Math.random() < 0.7){

          c.userData.caught = true;
          scene.remove(c);
          caught.push(c.userData.id);

          toast("YAKALANDI 🔥");
          $('statusPill').textContent = "Yakalanan: "+caught.length;

          // firebase gönder
          if(uid){
            set(ref(db,"rooms/"+room+"/players/"+uid),{
              caught:caught.length
            });
          }

        }else{
          toast("KAÇTI!");
        }

        scene.remove(b);
        balls.splice(balls.indexOf(b),1);
      }
    }

    if(b.userData.life<=0){
      scene.remove(b);
      balls.splice(balls.indexOf(b),1);
    }
  }
}

//////////////////////////////////////////////////////
// 🔄 ANA LOOP GÜNCELLE
//////////////////////////////////////////////////////

const oldUpdate = updatePlayer;

updatePlayer = function(dt){

  oldUpdate(dt);

  const time = clock.elapsedTime;

  updateCreatures(dt,time);
  updateBalls(dt);

  // firebase sync
  if(uid){
    update(ref(db,"rooms/"+room+"/players/"+uid),{
      x:player.position.x,
      z:player.position.z
    });
  }
};

//////////////////////////////////////////////////////
// 🟢 ONLINE OYUNCULAR
//////////////////////////////////////////////////////

onValue(ref(db,"rooms/"+room+"/players"),snap=>{
  const data = snap.val() || {};
  // buraya diğer oyuncuları çizebilirsin (şu an basic)
});

//////////////////////////////////////////////////////
// 🚀 BİTTİ
//////////////////////////////////////////////////////
</script>
