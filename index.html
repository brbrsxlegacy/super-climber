<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Beast Arena</title>
<style>
body{margin:0;background:#87CEEB;overflow:hidden;font-family:monospace}
canvas{display:block}
.ui{position:fixed;top:10px;left:50%;transform:translateX(-50%);color:white;font-weight:bold;text-shadow:2px 2px black}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui" id="ui">Yükleniyor...</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
addEventListener('resize',resize);resize();

let player={hp:100,max:100};
let enemy={hp:100,max:100};

// PIXEL DRAW SYSTEM
function pixelRect(x,y,size,color){
 ctx.fillStyle=color;
 ctx.fillRect(Math.floor(x),Math.floor(y),size,size);
}

function drawPixelBeast(x,y,color1,color2){
 let s=6; // pixel size

 // body
 for(let i=0;i<8;i++){
  for(let j=0;j<6;j++){
    pixelRect(x+i*s,y+j*s,s,color1);
  }
 }

 // eyes
 pixelRect(x+2*s,y+2*s,s,color2);
 pixelRect(x+5*s,y+2*s,s,color2);

 // legs
 pixelRect(x+1*s,y+6*s,s,color1);
 pixelRect(x+6*s,y+6*s,s,color1);

 // spikes
 pixelRect(x+3*s,y-1*s,s,color2);
 pixelRect(x+4*s,y-1*s,s,color2);
}

function drawArena(){
 ctx.fillStyle="#6ecb63";
 ctx.fillRect(0,H*0.7,W,H*0.3);

 // pixel grid effect
 for(let i=0;i<W;i+=20){
  ctx.fillStyle="#5bbf55";
  ctx.fillRect(i,H*0.7,2,H*0.3);
 }
}

function drawUI(){
 document.getElementById('ui').innerText =
  "Sen HP: "+player.hp+" | Düşman HP: "+enemy.hp;
}

canvas.addEventListener('click',()=>{
 let dmg=Math.floor(Math.random()*10+5);
 enemy.hp-=dmg;
 if(enemy.hp<=0){
  enemy.hp=100;
 }
});

setInterval(()=>{
 let dmg=Math.floor(Math.random()*5+2);
 player.hp-=dmg;
 if(player.hp<=0){
  player.hp=100;
 }
},1000);

function loop(){
 ctx.clearRect(0,0,W,H);
 drawArena();

 // player
 drawPixelBeast(W*0.3,H*0.5,"#4CAF50","#000");

 // enemy
 drawPixelBeast(W*0.6,H*0.5,"#F44336","#000");

 drawUI();
 requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
